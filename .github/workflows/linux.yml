name: linux
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get repo files
        uses: actions/checkout@v6
      - name: Configure build directory
        run: cmake -H. -B build
      - name: Build project
        run: cmake --build build
      - name: Test hello_world
        run: echo ./build/hello_world
      - name: Test solver
        run: echo "1 5 -6" | ./build/solver
